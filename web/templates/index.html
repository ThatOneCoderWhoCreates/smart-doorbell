<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AI Doorbell</title>
    <link rel="stylesheet" href="/static/style.css">

    <!-- PWA Requirements -->
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#121826">
    <link rel="apple-touch-icon" href="/static/favicon.ico">
</head>

<body>

    <div class="dashboard container">

        <header class="glass-panel" style="backdrop-filter: blur(25px);">
            <div style="display: flex; align-items: center; gap: 15px;">
                <h1 style="margin: 0; font-size: 1.8rem; font-weight: 700;">Smart Doorbell</h1>
            </div>
            <div id="systemStatus" class="status offline">Offline</div>
        </header>

        <div class="main-content">

            <!-- LEFT COLUMN: CAMERA & CORE -->
            <div class="video-card glass-panel" style="padding: 15px;">
                <img src="/video_feed" class="video-feed" alt="Camera Feed Offline">

                <div class="info-panel desktop-info">
                    <p><strong>Threat Level:</strong> <span id="threatLevel">Normal</span></p>
                    <p><strong>Last Event:</strong> <span id="lastEvent">None</span></p>
                </div>

                <div
                    style="display: flex; gap: 15px; margin-top: 20px; flex-wrap: wrap; justify-content: center; align-items: center; background: rgba(0, 0, 0, 0.2); padding: 20px; border-radius: 16px;">
                    <div style="text-align: center; flex: 1; min-width: 200px;">
                        <button id="micButton" class="mic-btn" style="margin: 0; width: 100%; border-radius: 50px;"
                            onmousedown="startAudio()" onmouseup="stopAudio()" ontouchstart="startAudio()"
                            ontouchend="stopAudio()">🎙️ Hold to Talk</button>
                        <p id="audioStatus"
                            style="font-size: 0.85em; color: rgba(255,255,255,0.7); margin-top: 8px; margin-bottom: 0;">
                            Connecting...</p>
                    </div>
                    <div style="flex: 1; min-width: 200px;">
                        <button onclick="simulatePIR()" class="btn-warning"
                            style="width: 100%; font-size: 1.1rem; margin: 0; font-weight: 700; border-radius: 50px;">🚶‍♂️
                            Simulate Motion</button>
                    </div>
                </div>
            </div>

            <!-- RIGHT COLUMN: CONTROLS & RECENT -->
            <div style="display: flex; flex-direction: column; gap: 25px;">

                <!-- Access Control -->
                <div class="control-card glass-panel">
                    <h2 style="margin-top: 0; margin-bottom: 5px;">Access Control</h2>
                    <p style="margin-top: 0; color: rgba(255,255,255,0.7); font-size: 0.9rem;">Manage smart lock</p>

                    <div class="lock-visual-container">
                        <div id="visualLock" class="lock-icon locked">🔒</div>
                    </div>

                    <div style="display: flex; gap: 12px; margin-top: 20px;">
                        <button class="control-btn" onclick="lockDoor()"
                            style="flex: 1; background: rgba(239, 68, 68, 0.2); border-color: rgba(239,68,68,0.5);">🔒
                            Lock</button>
                        <button class="control-btn" onclick="unlockDoor()"
                            style="flex: 1; background: rgba(16, 185, 129, 0.2); border-color: rgba(16,185,129,0.5);">🔓
                            Unlock</button>
                    </div>
                </div>

                <!-- System Power -->
                <div class="control-card glass-panel">
                    <h2 style="margin-top: 0; margin-bottom: 15px;">System Power</h2>
                    <div style="display: flex; gap: 12px;">
                        <button onclick="startSystem()"
                            style="background: rgba(37, 99, 235, 0.3); border-color: rgba(37, 99, 235, 0.6); flex: 1;">Start
                            System</button>
                        <button onclick="stopSystem()"
                            style="background: rgba(239, 68, 68, 0.3); border-color: rgba(239, 68, 68, 0.6); flex: 1;">Stop
                            System</button>
                    </div>
                </div>

                <!-- Recent Recordings Snippet -->
                <div class="recording-card glass-panel">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                        <h2 style="margin: 0;">Recent</h2>
                        <button onclick="window.location.href='/recordings_page'"
                            style="width: auto; margin: 0; padding: 6px 14px; border-radius: 50px; font-size: 0.85rem; background: rgba(255,255,255,0.2);">View
                            All ➔</button>
                    </div>

                    <ul id="recordingList" class="recording-list">
                        <li>Loading...</li>
                    </ul>
                </div>

            </div>

        </div>

        <!-- Video Modal Overlay -->
        <div id="videoModal"
            style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; padding: 20px; box-sizing: border-box;">
            <div
                style="max-width: 800px; width: 100%; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.2);">
                <video id="playbackVideo" width="100%" controls
                    style="border-radius: 8px; background: black; max-height: 70vh;">
                    Your browser does not support the video tag.
                </video>
                <button onclick="closeVideo()" class="control-btn"
                    style="margin-top: 15px; margin-bottom: 0; background: rgba(239, 68, 68, 0.4);">Close Video</button>
            </div>
        </div>

    </div>

    <script src="/static/app.js"></script>

</body>

</html>
