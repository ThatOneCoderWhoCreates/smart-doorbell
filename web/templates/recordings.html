<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Storage - Smart Doorbell</title>
    <link rel="stylesheet" href="/static/style.css">
    <meta name="theme-color" content="#5b21b6">
</head>

<body class="bg-gradient">

    <div class="dashboard container">

        <header class="glass-panel">
            <div style="display: flex; align-items: center; gap: 15px;">
                <button onclick="window.location.href='/'" class="back-btn">← Back</button>
                <h1 style="margin: 0; font-size: 1.5rem;">Video Library</h1>
            </div>
            <div id="systemStatus" class="status offline" style="display: none;">Offline</div>
        </header>

        <div class="recording-card glass-panel" style="display: block !important;">
            <h2 style="margin-top: 0; margin-bottom: 20px;">All Recordings</h2>

            <div class="filter-controls">
                <div style="flex: 1;">
                    <label for="sortOrder">Sort By:</label>
                    <select id="sortOrder" onchange="fetchRecordings()">
                        <option value="newest">Newest First</option>
                        <option value="oldest">Oldest First</option>
                    </select>
                </div>
                <div style="flex: 1;">
                    <label for="filterDate">Filter Date:</label>
                    <input type="date" id="filterDate" onchange="fetchRecordings()">
                </div>
                <div style="display: flex; align-items: flex-end;">
                    <button onclick="document.getElementById('filterDate').value=''; fetchRecordings()"
                        class="control-btn" style="background: rgba(231, 76, 60, 0.8);">Clear</button>
                </div>
            </div>

            <div id="videoModal" style="display: none; margin-bottom: 20px;">
                <video id="playbackVideo" width="100%" controls
                    style="border-radius: 12px; border: 2px solid rgba(255,255,255,0.2); background: black;">
                    Your browser does not support the video tag.
                </video>
                <button onclick="closeVideo()" class="control-btn"
                    style="margin-top: 10px; background: rgba(255,255,255,0.1);">Close Video</button>
            </div>

            <ul id="recordingList" class="recording-list">
                <li>Loading...</li>
            </ul>
        </div>

    </div>

    <script src="/static/app.js"></script>
    <script>
        // Override the default fetch to get EVERYTHING since we are on the dedicated page
        window.isRecordingsPage = true;
        fetchRecordings();
    </script>
</body>

</html>
